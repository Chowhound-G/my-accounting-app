version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: accounting-db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-mydatabase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 自动执行初始化脚本（表结构）
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-mydatabase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: accounting-api
    environment:
      DB_HOST: db  # 关键：使用服务名作为主机名
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mydatabase}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy  # 等数据库健康后才启动
    restart: unless-stopped

volumes:
  postgres_data: