version: '3.8'

# 生产环境 Docker Compose 配置
# 使用 GitHub Actions 构建的镜像

services:
  api:
    # 使用 GitHub Container Registry 的镜像
    image: ghcr.io/chowhound-g/my-accounting-app:main
    # 或者使用 Docker Hub
    # image: docker.io/chowhound-g/accounting-api:latest

    container_name: accounting-api-prod
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-mydatabase}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD}
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    container_name: accounting-db-prod
    environment:
      - POSTGRES_DB=${DB_NAME:-mydatabase}
      - POSTGRES_USER=${DB_USER:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
